version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_v4:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - vartapravah-net

  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.24.2
    restart: unless-stopped
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=root
      - POSTGRES_PWD=password
      - POSTGRES_SEEDS=postgres
      - TEMPORAL_VISIBILITY_STORE_TYPE=postgres

      # 🔥 FIX (MOST IMPORTANT)
      - SKIP_SCHEMA_SETUP=true
      - SKIP_DB_CREATE=true

    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vartapravah-net

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:latest
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_UI_PORT=8080
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks:
      - vartapravah-net

  backend:
    container_name: vartapravah_backend
    build: ./backend
    working_dir: /app
    restart: unless-stopped
    command: /bin/bash -c "ls -la /app && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://root:password@postgres:5432/temporal
      - TEMPORAL_ADDRESS=temporal:7233
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
      - ./backend/videos:/app/videos
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - vartapravah-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend-worker:
    container_name: vartapravah_worker
    build: ./backend
    working_dir: /app
    restart: unless-stopped
    command: /bin/bash -c "ls -laR /app && python -m streaming_engine.worker"
    environment:
      - DATABASE_URL=postgresql://root:password@postgres:5432/temporal
      - TEMPORAL_ADDRESS=temporal:7233
      - AUTO_START_CHANNEL_ID=1
      - DEFAULT_LANGUAGE=mr
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_started
      temporal:
        condition: service_started
    networks:
      - vartapravah-net

  frontend:
    container_name: vartapravah_frontend
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - vartapravah-net

networks:
  vartapravah-net:
    driver: bridge

volumes:
  postgres_data_v4: