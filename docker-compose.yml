version: "3.9"

services:

  # =========================
  # 🗄️ POSTGRES
  # =========================
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: temporal
    volumes:
      - postgres_data_v12:/var/lib/postgresql/data
    networks: [app-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =========================
  # ⏱️ TEMPORAL
  # =========================
  temporal:
    image: temporalio/auto-setup:1.24.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      POSTGRES_USER: root
      POSTGRES_PWD: password
      POSTGRES_SEEDS: postgres
    networks: [app-net]

  # =========================
  # 🌐 TEMPORAL UI
  # =========================
  temporal-ui:
    image: temporalio/ui:latest
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    networks: [app-net]

  # =========================
  # 🚀 BACKEND (FASTAPI)
  # =========================
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://root:password@postgres:5432/temporal
      TEMPORAL_ADDRESS: temporal:7233
    networks: [app-net]

    command: >
      sh -c "
      echo '⏳ Waiting for DB...' &&
      sleep 5 &&
      uvicorn main:app --host 0.0.0.0 --port 8000
      "

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # ⚙️ WORKER (MONITOR)
  # =========================
  backend-worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://root:password@postgres:5432/temporal
      TEMPORAL_ADDRESS: temporal:7233
      YOUTUBE_STREAM_KEY: ${YOUTUBE_STREAM_KEY}
    networks: [app-net]

    command: >
      sh -c "
      echo '⏳ Waiting for Temporal...' &&
      sleep 5 &&
      python3 monitor.py
      "

  # =========================
  # 🎨 FRONTEND
  # =========================
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks: [app-net]

networks:
  app-net:

volumes:
  postgres_data_v12: