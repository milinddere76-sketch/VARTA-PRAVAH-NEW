version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_v4:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 600s
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - vartapravah-net

  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.24.2
    restart: always
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=root
      - POSTGRES_PWD=password
      - POSTGRES_SEEDS=postgres
      - SKIP_DB_CREATE=false
      - SKIP_SCHEMA_SETUP=false
      - SKIP_DEFAULT_NAMESPACE_CREATION=false
      - TEMPORAL_VISIBILITY_STORE_TYPE=postgres
    ports:
      - "7233:7233"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vartapravah-net

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:latest
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_GRPC_ENDPOINT=temporal:7233
      - TEMPORAL_NOTIFY_ON_NEW_VERSION=false
      - TEMPORAL_DISABLE_USAGE_COLLECTION=true
      - TEMPORAL_UI_PORT=8080
      - TEMPORAL_GRPC_TIMEOUT=300s
      - TEMPORAL_UI_LOCAL_AUTH=true
    ports:
      - "8088:8080"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - temporal
    networks:
      - vartapravah-net

  frontend:
    container_name: vartapravah_frontend
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - backend
    networks:
      - vartapravah-net

  backend:
    container_name: vartapravah_backend
    build: ./backend
    restart: always
    command: python main.py
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://root:password@postgres:5432/temporal
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_HOST=temporal:7233
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/videos:/app/videos
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      temporal:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - vartapravah-net

  backend-worker:
    container_name: vartapravah_worker
    build: ./backend
    restart: always
    command: python -m temporal.worker
    environment:
      - DATABASE_URL=postgresql://root:password@postgres:5432/temporal
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_HOST=temporal:7233
      - PYTHONUNBUFFERED=1
      - AUTO_START_CHANNEL_ID=1
      - DEFAULT_LANGUAGE=mr
      - YOUTUBE_STREAM_KEY=qcu7-xesd-m4sv-9zvv-e335
    volumes:
      - ./backend/videos:/app/videos
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - backend
      - temporal
    networks:
      - vartapravah-net

networks:
  vartapravah-net:
    driver: bridge

volumes:
  postgres_data_v4:
