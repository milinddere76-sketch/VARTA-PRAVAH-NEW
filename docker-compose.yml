
services:

  # =========================
  # 🗄️ POSTGRES
  # =========================
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data_v12:/var/lib/postgresql/data
    networks: [app-net]
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # =========================
  # ⏱️ TEMPORAL
  # =========================
  temporal:
    image: temporalio/auto-setup:1.24.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
    environment:
      DB: postgres12
      DB_ADDR: postgres
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_SEEDS: postgres
    networks: [app-net]
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # =========================
  # 🌐 TEMPORAL UI
  # =========================
  temporal-ui:
    image: temporalio/ui:latest
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
    networks: [app-net]
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # =========================
  # 🚀 BACKEND (FASTAPI)
  # =========================
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://root:password@postgres:5432/temporal}
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
    networks: [app-net]
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    command: >
      sh -c "
      echo '⏳ Waiting for DB...' &&
      sleep 30 &&
      uvicorn main:app --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # ⚙️ WORKER (MONITOR)
  # =========================
  backend-worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://root:password@postgres:5432/temporal}
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS:-temporal:7233}
      YOUTUBE_STREAM_KEY: ${YOUTUBE_STREAM_KEY}
    networks: [app-net]
    deploy:
      resources:
        limits:
          memory: 768M # Higher for FFmpeg/Rendering
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    command: >
      sh -c "
      echo '⏳ Waiting for Temporal...' &&
      sleep 35 &&
      python3 monitor.py
      "

  # =========================
  # 🎨 FRONTEND
  # =========================
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks: [app-net]
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-net:

volumes:
  postgres_data_v12: