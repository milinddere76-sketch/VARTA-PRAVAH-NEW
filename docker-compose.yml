services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: varta_pravah_secure_99
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_v11:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vartapravah-net

  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.24.2
    restart: always
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=varta_pravah_secure_99
      - POSTGRES_PASSWORD=varta_pravah_secure_99
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vartapravah-net

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:latest
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_UI_PORT=8080
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks:
      - vartapravah-net

  backend:
    container_name: vartapravah_backend
    build: ./backend
    working_dir: /app
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:varta_pravah_secure_99@postgres:5432/temporal
      - TEMPORAL_ADDRESS=temporal:7233
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    volumes:
      - ./backend/videos:/app/videos
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - vartapravah-net

  backend-worker:
    container_name: vartapravah_worker
    build: ./backend
    working_dir: /app
    restart: always
    command: python monitor.py
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:varta_pravah_secure_99@postgres:5432/temporal
      - TEMPORAL_ADDRESS=temporal:7233
      - AUTO_START_CHANNEL_ID=1
      - DEFAULT_LANGUAGE=Marathi
      - YOUTUBE_STREAM_KEY=${YOUTUBE_STREAM_KEY}
      - PYTHONPATH=/app
    volumes:
      - ./backend/videos:/app/videos
    depends_on:
      - backend
      - temporal
    networks:
      - vartapravah-net

  frontend:
    container_name: vartapravah_frontend
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=W3mUwLYSQC9bPN68YyAr6l7FBw9KHAcrnReU/tiSjBg=
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vartapravah-net

networks:
  vartapravah-net:
    driver: bridge

volumes:
  postgres_data_v11:
  backend_videos: