version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vartapravah
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_v3:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d vartapravah"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vartapravah-net

  temporal:
    container_name: temporal
    image: temporalio/server:1.24.2
    restart: always
    environment:
      - SQL_DRIVER=postgres
      - SQL_USER=root
      - SQL_PASSWORD=password
      - SQL_ADDR=postgres:5432
      - SQL_DATABASE=temporal
      - SQL_VISIBILITY_DATABASE=temporal_visibility
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vartapravah-net

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:latest
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_GRPC_ENDPOINT=temporal:7233
      - TEMPORAL_CORS_ORIGINS=*
      - TEMPORAL_NOTIFY_ON_NEW_VERSION=false
      - TEMPORAL_DISABLE_USAGE_COLLECTION=true
      - TEMPORAL_UI_PORT=8080
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - temporal
    networks:
      - vartapravah-net

  frontend:
    container_name: vartapravah_frontend
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - vartapravah-net

  backend:
    container_name: vartapravah_backend
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://root:password@postgres:5432/vartapravah
      - TEMPORAL_HOST=temporal:7233
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/videos:/app/videos
    depends_on:
      temporal:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - vartapravah-net

  backend-worker:
    container_name: vartapravah_worker
    build: ./backend
    restart: always
    command: ["python", "-m", "temporal.worker"]
    environment:
      - DATABASE_URL=postgresql://root:password@postgres:5432/vartapravah
      - TEMPORAL_HOST=temporal:7233
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/videos:/app/videos 
    depends_on:
      - backend
      - temporal
    networks:
      - vartapravah-net

networks:
  vartapravah-net:
    driver: bridge

volumes:
  postgres_data_v3:
