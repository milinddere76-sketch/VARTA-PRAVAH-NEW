
services:

  # =========================
  # 🗄️ POSTGRES
  # =========================
  postgres:
    image: postgres:12
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data_v12:/var/lib/postgresql/data
    networks: [app-net]
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # =========================
  # ⏱️ TEMPORAL
  # =========================
  temporal:
    image: temporalio/auto-setup:1.24.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
    environment:
      DB: postgres12
      DB_ADDR: postgres
      DB_PORT: 5432
      POSTGRES_USER: root
      POSTGRES_PWD: password
      POSTGRES_SEEDS: postgres
    networks: [app-net]
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # =========================
  # 🌐 TEMPORAL UI
  # =========================
  temporal-ui:
    image: temporalio/ui:latest
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    networks: [app-net]
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # =========================
  # 🚀 BACKEND (FASTAPI)
  # =========================
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://root:password@postgres:5432/temporal
      TEMPORAL_ADDRESS: temporal:7233
      GROQ_API_KEY: ${GROQ_API_KEY}
      WORLD_NEWS_API_KEY: ${WORLD_NEWS_API_KEY}
      SYNCLABS_API_KEY: ${SYNCLABS_API_KEY}
    networks: [app-net]
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - video_data:/app/videos
    command: >
      sh -c "
      echo '⏳ Waiting for Database...' &&
      until nc -z postgres 5432; do sleep 2; done &&
      echo '✅ DB Online. Starting API...' &&
      python3 main.py
      "

  # =========================
  # ⚙️ WORKER (MONITOR)
  # =========================
  backend-worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - temporal
    environment:
      DATABASE_URL: postgresql://root:password@postgres:5432/temporal
      TEMPORAL_ADDRESS: temporal:7233
      YOUTUBE_STREAM_KEY: ${YOUTUBE_STREAM_KEY:-5w92-9u7p-ucjh-b1bx-bszv}  # Use env var or default placeholder
      GROQ_API_KEY: ${GROQ_API_KEY}
      WORLD_NEWS_API_KEY: ${WORLD_NEWS_API_KEY}
      SYNCLABS_API_KEY: ${SYNCLABS_API_KEY}
    networks: [app-net]
    deploy:
      resources:
        limits:
          memory: 1024M # Increased for rendering stability
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - video_data:/app/videos
      - ./backend/assets:/app/assets
    command: >
      sh -c "
      echo '⏳ Waiting for Brain (Temporal)...' &&
      until nc -z temporal 7233; do sleep 2; done &&
      echo '✅ Brain Online. Starting Worker...' &&
      python3 monitor.py
      "

  # =========================
  # 🎨 FRONTEND
  # =========================
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks: [app-net]
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-net:

volumes:
  postgres_data_v12:
  video_data: