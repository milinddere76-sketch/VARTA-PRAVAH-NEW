version: "3.9"

services:

  # =========================
  # 🗄️ POSTGRES
  # =========================
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: temporal
    volumes:
      - postgres_data_v12:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =========================
  # ⏱️ TEMPORAL
  # =========================
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: root
      POSTGRES_PWD: password
      POSTGRES_SEEDS: postgres
    networks:
      - app-net
    restart: unless-stopped

  # =========================
  # 🌐 TEMPORAL UI
  # =========================
  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    networks:
      - app-net
    restart: unless-stopped

  # =========================
  # 🚀 BACKEND (FASTAPI)
  # =========================
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://root:password@postgres:5432/temporal
      TEMPORAL_ADDRESS: temporal:7233
    networks:
      - app-net
    restart: unless-stopped

    command: >
      sh -c "
      echo '⏳ Waiting for DB...' &&
      sleep 5 &&
      uvicorn main:app --host 0.0.0.0 --port 8000
      "

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # ⚙️ WORKER (TEMPORAL)
  # =========================
  backend-worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-worker
    depends_on:
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://root:password@postgres:5432/temporal
      TEMPORAL_ADDRESS: temporal:7233
      PYTHONPATH: /app
      YOUTUBE_STREAM_KEY: ${YOUTUBE_STREAM_KEY}
    networks:
      - app-net
    restart: unless-stopped

    command: >
      sh -c "
      echo '⏳ Waiting for Temporal...' &&
      sleep 5 &&
      python3 monitor.py
      "

  # =========================
  # 🎨 FRONTEND (OPTIONAL)
  # =========================
  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped

# =========================
# NETWORK + VOLUME
# =========================
networks:
  app-net:

volumes:
  postgres_data_v12: