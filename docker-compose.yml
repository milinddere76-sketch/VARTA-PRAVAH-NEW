services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_v4:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - vartapravah-net

  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.24.2
    restart: unless-stopped
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - DB_NAME=temporal
      - POSTGRES_USER=root
      - POSTGRES_PWD=password
      - POSTGRES_SEEDS=postgres
      - BIND_ON_IP=0.0.0.0
      - TEMPORAL_RPC_ADDRESS=0.0.0.0:7233
      - SKIP_DB_SCHEMA_REUSE=false
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vartapravah-net

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:2.27.0
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8088:8080"
    depends_on:
      temporal:
        condition: service_started
    networks:
      - vartapravah-net

  backend:
    container_name: vartapravah_backend
    build: ./backend
    working_dir: /app
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/docs || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 120s
    environment:
      - DATABASE_URL=postgresql+psycopg://root:password@postgres:5432/temporal
      - TEMPORAL_ADDRESS=temporal:7233
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    volumes:
      - ./backend/videos:/app/videos
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - vartapravah-net

  backend-worker:
    container_name: vartapravah_worker
    build: ./backend
    working_dir: /app
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: python -m streaming_engine.worker
    environment:
      - DATABASE_URL=postgresql+psycopg://root:password@postgres:5432/temporal
      - TEMPORAL_ADDRESS=temporal:7233
      - AUTO_START_ALL_CHANNELS=False
      - AUTO_START_CHANNEL_ID=1
      - PYTHONPATH=/app
      - GROQ_API_KEY=${GROQ_API_KEY}
      - WORLD_NEWS_API_KEY=${WORLD_NEWS_API_KEY}
      - SYNCLABS_API_KEY=${SYNCLABS_API_KEY}
      - SYNC_LABS_FEMALE_VIDEO=${SYNC_LABS_FEMALE_VIDEO}
      - SYNC_LABS_MALE_VIDEO=${SYNC_LABS_MALE_VIDEO}
      - YOUTUBE_STREAM_KEY=${YOUTUBE_STREAM_KEY}
      - YOUTUBE_STREAM_KEY_CH2=${YOUTUBE_STREAM_KEY_CH2}
    volumes:
      - ./backend/videos:/app/videos
      - ./backend/assets:/app/assets
    depends_on:
      backend:
        condition: service_started
      temporal:
        condition: service_started
    networks:
      - vartapravah-net


  frontend:
    container_name: vartapravah_frontend
    build: ./frontend
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=W3mUwLYSQC9bPN68YyAr6l7FBw9KHAcrnReU/tiSjBg=
    depends_on:
      backend:
        condition: service_started
    networks:
      - vartapravah-net

networks:
  vartapravah-net:
    driver: bridge

volumes:
  postgres_data_v4: