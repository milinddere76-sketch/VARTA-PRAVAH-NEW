app = "vartapravah-news-engine"
primary_region = "iad"  # Or your closest region

[build]
  dockerfile = "Dockerfile"

# This is a pure background streaming worker.
# We do not expose any incoming ports.
# It continuously pushes RTMP streams *outward* to YouTube.

[env]
  # Provide placeholders for keys. You will inject these via flyctl secrets.
  # fly secrets set YOUTUBE_STREAM_KEY=xxx GROQ_API_KEY=xxx WORLD_NEWS_API_KEY=xxx
  MOCK_MODE = "false"

[processes]
  app = "./entrypoint.sh"

[[vm]]
  size = "shared-cpu-2x"  # Needed for basic FFmpeg processing speeds
  memory = "2gb"          # Minimum for continuous LLM & FFmpeg operations
  cpu_kind = "shared"
