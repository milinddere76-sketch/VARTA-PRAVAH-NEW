<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060b"/>
      <stop offset="100%" stop-color="#141822"/>
    </linearGradient>
    <linearGradient id="panelGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#191f38"/>
    </linearGradient>
    <linearGradient id="neonGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#33d3ff"/>
      <stop offset="100%" stop-color="#7f47ff"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8d96b"/>
    </linearGradient>
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGradient)"/>
  <rect x="36" y="120" width="440" height="272" rx="40" fill="url(#panelGradient)" stroke="url(#neonGradient)" stroke-width="10" filter="url(#outerGlow)"/>
  <rect x="52" y="136" width="408" height="240" rx="28" fill="#111827" opacity="0.90"/>

  <g filter="url(#shadow)">
    <text x="256" y="252" text-anchor="middle" font-family="'Noto Sans Devanagari', 'DejaVu Sans', sans-serif" font-size="76" font-weight="900" fill="#000" transform="translate(0,4)">वार्ता प्रवाह</text>
  </g>
  <text x="256" y="244" text-anchor="middle" font-family="'Noto Sans Devanagari', 'DejaVu Sans', sans-serif" font-size="76" font-weight="900" fill="url(#titleGradient)" style="text-shadow: 0 2px 10px rgba(255,255,255,0.45)">वार्ता प्रवाह</text>

  <g filter="url(#outerGlow)">
    <path d="M196 292 C226 262 286 262 316 292" fill="none" stroke="url(#neonGradient)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <path d="M206 304 C226 284 286 284 306 304" fill="none" stroke="url(#neonGradient)" stroke-width="4" stroke-linecap="round" opacity="0.65"/>
    <circle cx="256" cy="324" r="10" fill="#33d3ff" opacity="0.95"/>
    <path d="M246 324 A10 10 0 0 1 266 324" fill="none" stroke="url(#neonGradient)" stroke-width="3" opacity="0.8"/>
  </g>

  <rect x="156" y="360" width="200" height="52" rx="24" fill="#101f3f" opacity="0.96"/>
  <rect x="160" y="364" width="192" height="44" rx="22" fill="url(#neonGradient)" opacity="0.20"/>
  <text x="256" y="392" text-anchor="middle" font-family="'Noto Sans Devanagari', 'DejaVu Sans', sans-serif" font-size="26" font-weight="700" fill="#33d3ff">न्यूज चैनल</text>

  <path d="M100 156 H412 L380 210 H132 Z" fill="rgba(51,211,255,0.14)"/>
  <path d="M100 156 H412 L380 210 H132 Z" fill="none" stroke="url(#neonGradient)" stroke-width="4" opacity="0.36"/>
</svg>
