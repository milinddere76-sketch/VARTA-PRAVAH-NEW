<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Background -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060b"/>
      <stop offset="100%" stop-color="#141822"/>
    </linearGradient>

    <!-- Panel -->
    <linearGradient id="panelGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#191f38"/>
    </linearGradient>

    <!-- Neon -->
    <linearGradient id="neonGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#33d3ff"/>
      <stop offset="100%" stop-color="#7f47ff"/>
    </linearGradient>

    <!-- Title -->
    <linearGradient id="titleGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8d96b"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Proper Text Shadow -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.6"/>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGradient)"/>

  <!-- Panel -->
  <rect x="36" y="120" width="440" height="272" rx="40"
        fill="url(#panelGradient)"
        stroke="url(#neonGradient)"
        stroke-width="8"
        filter="url(#outerGlow)"/>

  <rect x="52" y="136" width="408" height="240" rx="28"
        fill="#111827" opacity="0.92"/>

  <!-- Title -->
  <text x="256" y="250"
        text-anchor="middle"
        font-family="sans-serif"
        font-size="76"
        font-weight="900"
        fill="url(#titleGradient)"
        filter="url(#textShadow)">
    वार्ता प्रवाह
  </text>

  <!-- Signal Icon -->
  <g filter="url(#outerGlow)">
    <path d="M196 292 C226 262 286 262 316 292"
          fill="none"
          stroke="url(#neonGradient)"
          stroke-width="6"
          stroke-linecap="round"/>

    <path d="M206 304 C226 284 286 284 306 304"
          fill="none"
          stroke="url(#neonGradient)"
          stroke-width="4"
          stroke-linecap="round"
          opacity="0.7"/>

    <circle cx="256" cy="324" r="10" fill="#33d3ff"/>

    <path d="M246 324 A10 10 0 0 1 266 324"
          fill="none"
          stroke="url(#neonGradient)"
          stroke-width="3"/>
  </g>

  <!-- Bottom Badge -->
  <rect x="156" y="360" width="200" height="52" rx="24"
        fill="#101f3f" opacity="0.95"/>

  <rect x="160" y="364" width="192" height="44" rx="22"
        fill="url(#neonGradient)" opacity="0.2"/>

  <text x="256" y="392"
        text-anchor="middle"
        font-family="sans-serif"
        font-size="26"
        font-weight="700"
        fill="#33d3ff">
    मराठी LIVE
  </text>

  <!-- Top Accent -->
  <path d="M100 156 H412 L380 210 H132 Z"
        fill="rgba(51,211,255,0.12)"/>

  <path d="M100 156 H412 L380 210 H132 Z"
        fill="none"
        stroke="url(#neonGradient)"
        stroke-width="3"
        opacity="0.3"/>

</svg>